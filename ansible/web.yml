---
- name: Install and configure Nginx for Expense application
  hosts: all
  become: yes
  vars:
    frontend_zip_url: "https://expense-artifacts.s3.amazonaws.com/frontend.zip"
    temp_zip_path: "/tmp/frontend.zip"
    nginx_html_dir: "/usr/share/nginx/html"

  tasks:
    - name: Install nginx package
      ansible.builtin.dnf:
        name: nginx
        state: present

    - name: Copy expense configuration file
      ansible.builtin.copy:
        src: expense.conf
        dest: /etc/nginx/default.d/expense.conf
        mode: '0644'

    - name: Remove existing files from nginx html directory
      ansible.builtin.find:
        path: "{{ nginx_html_dir }}"
        file_type: any
      register: html_files

    - name: Delete all files in nginx html directory
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ html_files.files }}"
      when: html_files.files | length > 0

    - name: Download frontend zip file
      ansible.builtin.get_url:
        url: "{{ frontend_zip_url }}"
        dest: "{{ temp_zip_path }}"
        mode: '0644'

    - name: Extract frontend zip file to nginx directory
      ansible.builtin.unarchive:
        src: "{{ temp_zip_path }}"
        dest: "{{ nginx_html_dir }}"
        remote_src: yes

    - name: Enable and start nginx service
      ansible.builtin.systemd:
        name: nginx
        enabled: yes
        state: started
